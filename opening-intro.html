<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 FIFA World Cup – Opening Intro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      cursor: default;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    /* ---------- stats overlay ---------- */
    #stats-overlay {
      position: fixed;
      bottom: 40px;
      left: 48px;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-line {
      display: flex;
      align-items: baseline;
      gap: 14px;
      opacity: 0;
      transform: translateY(36px) scale(0.92);
      transition: opacity 0.7s cubic-bezier(.16, 1, .3, 1), transform 0.7s cubic-bezier(.16, 1, .3, 1);
      filter: blur(6px);
    }

    .stat-line.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .stat-number {
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #e2b04a, #f0d68a, #e2b04a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 16px rgba(226, 176, 74, .5));
      min-width: 90px;
    }

    .stat-label {
      font-size: 22px;
      font-weight: 300;
      color: rgba(255, 255, 255, .7);
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    /* final tagline */
    #tagline {
      margin-top: 12px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1s cubic-bezier(.16, 1, .3, 1) .1s, transform 1s cubic-bezier(.16, 1, .3, 1) .1s;
    }

    #tagline.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #tagline span {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e2b04a, #f0d68a, #e2b04a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 20px rgba(226, 176, 74, .5));
    }

    /* country label shown on hover */
    #country-label {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      transition: opacity .4s ease, color .4s ease;
      z-index: 20;
      pointer-events: none;
      padding: 8px 32px;
      border-radius: 8px;
      background: rgba(0, 0, 0, .45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, .15);
    }

    #country-label.visible {
      opacity: 1;
    }

    /* city tooltip */
    #city-tooltip {
      position: fixed;
      padding: 6px 16px;
      border-radius: 6px;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(226, 176, 74, .4);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      color: #f0d68a;
      pointer-events: none;
      opacity: 0;
      z-index: 30;
      transition: opacity .25s;
      white-space: nowrap;
    }

    /* hint */
    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255, 255, 255, .35);
      letter-spacing: 2px;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease 3s;
    }

    #hint.visible {
      opacity: 1;
    }

    /* loading */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
      transition: opacity .8s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(226, 176, 74, .2);
      border-top-color: #e2b04a;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div id="loading">
    <div class="spinner"></div>
  </div>
  <div id="canvas-container"></div>

  <div id="stats-overlay">
    <div class="stat-line" data-target="3">
      <span class="stat-number">0</span>
      <span class="stat-label">Countries</span>
    </div>
    <div class="stat-line" data-target="16">
      <span class="stat-number">0</span>
      <span class="stat-label">Cities</span>
    </div>
    <div class="stat-line" data-target="48">
      <span class="stat-number">0</span>
      <span class="stat-label">Teams</span>
    </div>
    <div class="stat-line" data-target="39">
      <span class="stat-number">0</span>
      <span class="stat-label">Days</span>
    </div>
    <div id="tagline">
      <span>All in One Map</span>
    </div>
  </div>

  <div id="country-label"></div>
  <div id="city-tooltip"></div>
  <div id="hint">HOVER OVER A HOST COUNTRY</div>

  <!-- Three.js + dependencies -->
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ===================================================================
       CONSTANTS & DATA
       =================================================================== */
    const EARTH_RADIUS = 5;
    const DEG2RAD = Math.PI / 180;

    // Approximate lat/lon for each host city
    const HOST_CITIES = {
      USA: [
        { name: 'New York / New Jersey', lat: 40.81, lon: -74.07 },
        { name: 'Los Angeles', lat: 33.95, lon: -118.34 },
        { name: 'Dallas', lat: 32.75, lon: -97.09 },
        { name: 'San Francisco', lat: 37.40, lon: -121.97 },
        { name: 'Miami', lat: 25.96, lon: -80.24 },
        { name: 'Atlanta', lat: 33.76, lon: -84.40 },
        { name: 'Houston', lat: 29.68, lon: -95.41 },
        { name: 'Philadelphia', lat: 39.90, lon: -75.17 },
        { name: 'Seattle', lat: 47.60, lon: -122.33 },
        { name: 'Kansas City', lat: 39.05, lon: -94.48 },
        { name: 'Boston', lat: 42.09, lon: -71.26 },
      ],
      Canada: [
        { name: 'Toronto', lat: 43.64, lon: -79.39 },
        { name: 'Vancouver', lat: 49.28, lon: -123.12 },
      ],
      Mexico: [
        { name: 'Mexico City', lat: 19.30, lon: -99.15 },
        { name: 'Guadalajara', lat: 20.70, lon: -103.39 },
        { name: 'Monterrey', lat: 25.67, lon: -100.31 },
      ],
    };

    const COUNTRY_COLORS = {
      USA: new THREE.Color(0x3b82f6),   // blue
      Canada: new THREE.Color(0xef4444),   // red
      Mexico: new THREE.Color(0x22c55e),   // green
    };

    const COUNTRY_DISPLAY_NAMES = {
      USA: 'UNITED STATES',
      Canada: 'CANADA',
      Mexico: 'MEXICO',
    };

    /* ===================================================================
       HELPERS
       =================================================================== */
    function latLonToVec3(lat, lon, r) {
      const phi = (90 - lat) * DEG2RAD;
      const theta = (lon + 180) * DEG2RAD;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta),
      );
    }

    /* approx country from lat/lon (improved bounding with priority) */
    function countryFromLatLon(lat, lon) {
      // Mexico first (southernmost, no overlap issues)
      if (lat >= 14 && lat < 32.5 && lon >= -118 && lon <= -86.5) return 'Mexico';
      // Canada: only above ~49° (US border) plus some eastern areas
      if (lat >= 49 && lon >= -141 && lon <= -52) return 'Canada';
      // Great Lakes / Southern Ontario area (Toronto lat ~43.6)
      if (lat >= 43 && lat < 49 && lon >= -89 && lon <= -74) return 'Canada';
      // Vancouver area
      if (lat >= 48 && lat < 55 && lon >= -130 && lon <= -114) return 'Canada';
      // USA (contiguous) – catch-all for remaining North America
      if (lat >= 24 && lat < 50 && lon >= -125 && lon <= -66) return 'USA';
      // Alaska
      if (lat >= 54 && lon >= -170 && lon <= -130) return 'USA';
      return null;
    }

    /* ===================================================================
       SCENE SETUP
       =================================================================== */
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 22);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = false;
    controls.minDistance = 6.5;
    controls.maxDistance = 30;
    controls.autoRotate = false;

    /* ---------- lights ---------- */
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
    sunLight.position.set(10, 8, 10);
    scene.add(sunLight);
    const rimLight = new THREE.DirectionalLight(0x8ecae6, 0.5);
    rimLight.position.set(-8, -3, -8);
    scene.add(rimLight);

    /* ---------- stars ---------- */
    {
      const starGeo = new THREE.BufferGeometry();
      const starCount = 6000;
      const positions = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);
      for (let i = 0; i < starCount; i++) {
        const r = 80 + Math.random() * 120;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.3 + Math.random() * 1.2;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        sizeAttenuation: true,
        size: 0.12,
        transparent: true,
        opacity: 0.85,
      });
      scene.add(new THREE.Points(starGeo, starMat));
    }

    /* ---------- earth ---------- */
    const textureLoader = new THREE.TextureLoader();
    let earthMesh, cloudsMesh, glowMesh;
    let earthReady = false;

    // Shared country-borders geometry (translucent overlay)
    const countryOverlayGroup = new THREE.Group();
    scene.add(countryOverlayGroup);

    // City markers group
    const cityMarkersGroup = new THREE.Group();
    scene.add(cityMarkersGroup);

    // Prepare city data for raycasting
    const allCityData = [];
    const cityMeshes = [];

    // Load Earth textures
    const earthDiffuse = 'https://unpkg.com/three-globe@2.34.0/example/img/earth-blue-marble.jpg';
    const earthBump = 'https://unpkg.com/three-globe@2.34.0/example/img/earth-topology.png';
    const earthSpec = 'https://unpkg.com/three-globe@2.34.0/example/img/earth-water.png';

    Promise.all([
      new Promise(r => textureLoader.load(earthDiffuse, r)),
      new Promise(r => textureLoader.load(earthBump, r)),
      new Promise(r => textureLoader.load(earthSpec, r)),
    ]).then(([diff, bump, spec]) => {
      // Earth
      const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 128);
      const earthMat = new THREE.MeshPhongMaterial({
        map: diff,
        bumpMap: bump,
        bumpScale: 0.04,
        specularMap: spec,
        specular: new THREE.Color(0x333333),
        shininess: 15,
      });
      earthMesh = new THREE.Mesh(earthGeo, earthMat);
      scene.add(earthMesh);

      // Atmosphere glow (inner)
      const glowGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.015, 64, 64);
      const glowMat = new THREE.ShaderMaterial({
        vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main(){
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position,1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
        fragmentShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main(){
        float intensity = pow(0.72 - dot(vNormal, vViewDir), 3.0);
        gl_FragColor = vec4(0.4, 0.7, 1.0, intensity * 0.55);
      }
    `,
        side: THREE.FrontSide,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      glowMesh = new THREE.Mesh(glowGeo, glowMat);
      scene.add(glowMesh);

      // Clouds
      const cloudGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.006, 64, 64);
      const cloudMat = new THREE.MeshPhongMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.18,
        depthWrite: false,
      });
      cloudsMesh = new THREE.Mesh(cloudGeo, cloudMat);
      scene.add(cloudsMesh);

      // Build country overlay surfaces
      buildCountryOverlays();

      // Build city markers
      buildCityMarkers();

      earthReady = true;
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('hint').classList.add('visible');
      }, 400);
    });

    /* ===================================================================
       COUNTRY OVERLAYS – no visible overlay, just use raycasting on earth
       =================================================================== */
    function buildCountryOverlays() {
      // Country detection is now handled entirely via lat/lon math in updateRaycast.
      // No visible overlay meshes needed – the country highlight is expressed
      // purely through the city markers popping up and the label at top.
    }

    /* ===================================================================
       CITY MARKERS
       =================================================================== */
    function buildCityMarkers() {
      for (const [country, cities] of Object.entries(HOST_CITIES)) {
        for (const city of cities) {
          const pos = latLonToVec3(city.lat, city.lon, EARTH_RADIUS * 1.006);

          // Pillar (thin cylinder from surface outwards)
          const pillarHeight = 0.35;
          const pillarGeo = new THREE.CylinderGeometry(0.012, 0.012, pillarHeight, 8);
          const pillarMat = new THREE.MeshBasicMaterial({
            color: COUNTRY_COLORS[country],
            transparent: true,
            opacity: 0,
          });
          const pillar = new THREE.Mesh(pillarGeo, pillarMat);

          // Orient pillar to point away from earth center
          const up = pos.clone().normalize();
          pillar.position.copy(pos).addScaledVector(up, pillarHeight / 2);
          pillar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), up);

          // Sphere on top
          const dotGeo = new THREE.SphereGeometry(0.045, 16, 16);
          const dotMat = new THREE.MeshBasicMaterial({
            color: COUNTRY_COLORS[country],
            transparent: true,
            opacity: 0,
          });
          const dot = new THREE.Mesh(dotGeo, dotMat);
          dot.position.copy(pos).addScaledVector(up, pillarHeight);

          // Glow ring
          const ringGeo = new THREE.RingGeometry(0.05, 0.1, 32);
          const ringMat = new THREE.MeshBasicMaterial({
            color: COUNTRY_COLORS[country],
            transparent: true,
            opacity: 0,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
          const ring = new THREE.Mesh(ringGeo, ringMat);
          ring.position.copy(pos).addScaledVector(up, pillarHeight);
          ring.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), up);

          // Create a city text sprite
          const sprite = makeCitySprite(city.name);
          sprite.position.copy(pos).addScaledVector(up, pillarHeight + 0.18);
          sprite.material.opacity = 0;
          sprite.scale.set(0.8, 0.2, 1);

          const group = new THREE.Group();
          group.add(pillar);
          group.add(dot);
          group.add(ring);
          group.add(sprite);
          group.userData = { country, city: city.name, basePos: pos.clone(), up: up.clone(), pillarHeight };

          cityMarkersGroup.add(group);
          allCityData.push({ group, country, city: city.name, dot, pillar, ring, sprite });
        }
      }
    }

    function makeCitySprite(text) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 512;
      canvas.height = 128;
      ctx.clearRect(0, 0, 512, 128);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 42px Outfit, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 8;
      ctx.fillText(text, 256, 64);

      const tex = new THREE.CanvasTexture(canvas);
      tex.minFilter = THREE.LinearFilter;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
      return new THREE.Sprite(mat);
    }

    /* ===================================================================
       ACTIVE COUNTRIES & RAYCASTING
       =================================================================== */
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(9999, 9999);

    // Use a Set so we can show multiple countries at once (for auto-demo finale)
    const activeCountries = new Set();
    let autoDemoRunning = false; // blocks mouse hover during auto-demo
    let autoDemoCompleted = false; // after demo, default to all-three

    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function showAllThree() {
      activeCountries.clear();
      ['USA', 'Canada', 'Mexico'].forEach(c => activeCountries.add(c));
      updateCountryLabel();
    }

    function updateRaycast() {
      if (autoDemoRunning) return; // skip mouse hover during auto-demo

      raycaster.setFromCamera(mouse, camera);
      if (!earthMesh) return;
      const hits = raycaster.intersectObject(earthMesh);
      let detectedCountry = null;

      if (hits.length > 0) {
        const localPoint = earthMesh.worldToLocal(hits[0].point.clone());
        const r = localPoint.length();
        const lat = 90 - Math.acos(localPoint.y / r) / DEG2RAD;
        const phi = (90 - lat) * DEG2RAD;
        const sinPhi = Math.sin(phi);
        let lon;
        if (Math.abs(sinPhi) < 0.0001) {
          lon = 0;
        } else {
          lon = Math.atan2(localPoint.z, -localPoint.x) / DEG2RAD - 180;
          if (lon < -180) lon += 360;
          if (lon > 180) lon -= 360;
        }
        detectedCountry = countryFromLatLon(lat, lon);
      }

      if (detectedCountry) {
        // Hovering over a specific country → show just that one
        const currentSingle = activeCountries.size === 1 ? [...activeCountries][0] : null;
        if (detectedCountry !== currentSingle) {
          activeCountries.clear();
          activeCountries.add(detectedCountry);
          updateCountryLabel();
        }
      } else if (autoDemoCompleted) {
        // Mouse outside any country → fall back to all three
        if (activeCountries.size !== 3) {
          showAllThree();
        }
      }
    }

    function updateCountryLabel() {
      const label = document.getElementById('country-label');
      if (activeCountries.size === 1) {
        const c = [...activeCountries][0];
        label.textContent = COUNTRY_DISPLAY_NAMES[c] || c;
        label.style.borderColor = '#' + COUNTRY_COLORS[c].getHexString();
        label.style.textShadow = '0 0 24px #' + COUNTRY_COLORS[c].getHexString();
        label.classList.add('visible');
      } else if (activeCountries.size > 1) {
        label.textContent = [...activeCountries].map(c => COUNTRY_DISPLAY_NAMES[c]).join('  ·  ');
        label.style.borderColor = '#e2b04a';
        label.style.textShadow = '0 0 24px rgba(226,176,74,.6)';
        label.classList.add('visible');
      } else {
        label.classList.remove('visible');
      }
    }

    /* ===================================================================
       AUTO-DEMO SEQUENCE
       After zoom completes: Canada → USA → Mexico → All Three → manual
       =================================================================== */
    function startAutoDemo() {
      autoDemoRunning = true;
      const SHOW_DURATION = 2000;  // ms each country is shown
      const PAUSE = 400;           // ms gap between countries
      const sequence = [
        { countries: ['Canada'], at: 0 },
        { countries: ['USA'], at: SHOW_DURATION + PAUSE },
        { countries: ['Mexico'], at: (SHOW_DURATION + PAUSE) * 2 },
        { countries: ['USA', 'Canada', 'Mexico'], at: (SHOW_DURATION + PAUSE) * 3 },
      ];
      const totalDuration = (SHOW_DURATION + PAUSE) * 3 + SHOW_DURATION + 800;

      sequence.forEach(step => {
        // Show
        setTimeout(() => {
          activeCountries.clear();
          step.countries.forEach(c => activeCountries.add(c));
          updateCountryLabel();
          // Start stats animation when all three countries appear
          if (step.countries.length === 3) startStatsAnimation();
        }, step.at);

        // Hide (except for the last step which stays until end)
        if (step !== sequence[sequence.length - 1]) {
          setTimeout(() => {
            activeCountries.clear();
            updateCountryLabel();
          }, step.at + SHOW_DURATION);
        }
      });

      // End demo → hand control to mouse (keep all three countries visible)
      setTimeout(() => {
        autoDemoRunning = false;
        autoDemoCompleted = true;
      }, totalDuration);
    }

    /* ===================================================================
       STATS ANIMATION
       =================================================================== */
    function startStatsAnimation() {
      const lines = document.querySelectorAll('.stat-line');
      const tagline = document.getElementById('tagline');
      const STAGGER = 1800;       // ms between each line
      const COUNT_DURATION = 1600; // ms for number count-up

      lines.forEach((line, i) => {
        const delay = i * STAGGER;
        const target = parseInt(line.dataset.target, 10);
        const numberEl = line.querySelector('.stat-number');

        // Reveal the line
        setTimeout(() => {
          line.classList.add('visible');

          // Count up the number
          const start = performance.now();
          function countUp(now) {
            const t = Math.min((now - start) / COUNT_DURATION, 1);
            // ease out quad
            const eased = 1 - (1 - t) * (1 - t);
            numberEl.textContent = Math.round(eased * target);
            if (t < 1) requestAnimationFrame(countUp);
          }
          requestAnimationFrame(countUp);
        }, delay);
      });

      // Tagline appears 3s after all stats
      setTimeout(() => {
        tagline.classList.add('visible');
      }, lines.length * STAGGER + 3400);
    }

    /* ===================================================================
       ANIMATION
       =================================================================== */
    // Camera animation: zoom toward North America
    const INITIAL_POS = new THREE.Vector3(0, 8, 22);
    // Focus slightly east of North America center (lon -90) so the continent
    // enters from the left as the earth slowly rotates
    const TARGET_POS = (() => {
      const p = latLonToVec3(35, -90, EARTH_RADIUS);
      const dir = p.clone().normalize();
      return p.clone().addScaledVector(dir, 5.0); // 5 units above surface
    })();

    const ZOOM_DURATION = 5.0; // seconds
    let elapsedTime = 0;
    let zoomComplete = false;
    const clock = new THREE.Clock();

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      elapsedTime += dt;

      // Camera zoom animation
      if (!zoomComplete) {
        const t = Math.min(elapsedTime / ZOOM_DURATION, 1);
        const eased = easeInOutCubic(t);
        camera.position.lerpVectors(INITIAL_POS, TARGET_POS, eased);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        if (t >= 1) {
          zoomComplete = true;
          controls.enabled = true;
          startAutoDemo(); // begin country showcase
        } else {
          controls.enabled = false;
        }
      }

      // Slowly rotate earth
      if (earthMesh) {
        earthMesh.rotation.y += 0.00015;
        if (cloudsMesh) cloudsMesh.rotation.y += 0.0004;
        if (glowMesh) glowMesh.rotation.y = earthMesh.rotation.y;

        // Sync overlay rotation
        countryOverlayGroup.rotation.y = earthMesh.rotation.y;
        cityMarkersGroup.rotation.y = earthMesh.rotation.y;
      }

      // Raycast (mouse hover – only when auto-demo is not running)
      if (earthReady && zoomComplete) {
        updateRaycast();
      }

      // (Country overlays removed – highlight is via city markers only)

      // Animate city markers
      const time = elapsedTime;
      allCityData.forEach((cd, idx) => {
        const isActive = activeCountries.has(cd.country);
        const targetOp = isActive ? 1 : 0;
        const currentOp = cd.dot.material.opacity;
        const newOp = currentOp + (targetOp - currentOp) * 0.1;

        cd.dot.material.opacity = newOp;
        cd.pillar.material.opacity = newOp * 0.6;
        cd.ring.material.opacity = newOp * 0.4;
        cd.sprite.material.opacity = newOp;

        // Wave animation: each city bounces with a phase offset
        if (isActive) {
          const wavePhase = idx * 0.6;
          const bounce = Math.sin(time * 3.5 + wavePhase) * 0.12 + 0.12; // 0 to 0.24
          const up = cd.group.userData.up;
          const base = cd.group.userData.basePos;
          const ph = cd.group.userData.pillarHeight;

          // Move dot & ring & sprite up/down
          cd.dot.position.copy(base).addScaledVector(up, ph + bounce);
          cd.ring.position.copy(base).addScaledVector(up, ph + bounce);
          cd.sprite.position.copy(base).addScaledVector(up, ph + bounce + 0.18);

          // Pulse ring
          const pulseScale = 1 + Math.sin(time * 4 + wavePhase) * 0.3;
          cd.ring.scale.set(pulseScale, pulseScale, 1);

          // Stretch pillar
          const newHeight = ph + bounce;
          cd.pillar.scale.y = newHeight / ph;
          cd.pillar.position.copy(base).addScaledVector(up, newHeight / 2);
        }
      });

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    /* ===================================================================
       RESIZE
       =================================================================== */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
